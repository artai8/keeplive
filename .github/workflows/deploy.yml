name: Deploy UptimeFlare Worker to Cloudflare

on:
  push:
    branches: [ main ]          # 或你的默认分支，如 master
  workflow_dispatch:            # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'      # 或你的项目需要的版本，通常 18 或 20

      - name: Install dependencies
        run: npm ci                 # 或 pnpm install / yarn install，根据你的 package.json

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}  # 如果 wrangler.toml 没指定，可选加这个 secret
          command: deploy
          # 如果需要指定 wrangler.toml 路径或其他参数，可加：
          # workingDirectory: ./
          # packageManager: npm
